<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background star glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffdd57"/>
    <stop offset="40%" stop-color="#f5a623" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
  </radialGradient>
  <circle cx="32" cy="32" r="30" fill="#0d1117"/>
  <circle cx="32" cy="32" r="18" fill="url(#glow)"/>
  <!-- Star -->
  <circle cx="32" cy="32" r="10" fill="#ffdd57"/>
  <!-- Transiting exoplanet -->
  <circle cx="38" cy="28" r="5" fill="#161b22"/>
  <!-- Orbit ring -->
  <ellipse cx="32" cy="32" rx="24" ry="8" fill="none" stroke="#58a6ff" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5" transform="rotate(-20 32 32)"/>
</svg>
